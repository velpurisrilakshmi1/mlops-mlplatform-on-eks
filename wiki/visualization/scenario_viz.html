s\u003cbr\u003e3. Registers best model version in MLflow Model Registry\u003cbr\u003e4. Opens SageMaker Dashboard at \u002fsagemaker\u003cbr\u003e5. Dashboard reads registered model artifacts from S3\u003cbr\u003e6. Builds ML serving container image, pushes image to ECR\u003cbr\u003e7. Deploys SageMaker real-time inference endpoint","showarrow":false,"align":"left","xanchor":"left","yanchor":"top","font":{"size":10,"color":"rgba(210,218,245,0.92)","family":"Inter, Arial, sans-serif"},"bgcolor":"rgba(10,14,28,0.90)","bordercolor":"#4CAF50","borderwidth":2,"borderpad":11}]}],"label":"  Model Deployment","method":"update"},{"args":[{"visible":[true,true,false,false,false,false,false,false,true,true,false,false,false,false,false,false]},{"title.text":"\u003cb\u003eNotebook Session\u003c\u002fb\u003e\u003cspan style='color:rgba(160,170,220,0.8);font-size:13px'\u003e  --  User logs in via GitHub OAuth -\u003e JupyterHub spawns pod -\u003e mounts EFS -\u003e runs experiments tracked in MLflow.\u003c\u002fspan\u003e","annotations":[{"x":1.01,"y":6.5,"xref":"paper","yref":"y","text":"\u003cb\u003eEntry\u003c\u002fb\u003e","showarrow":false,"font":{"size":9,"color":"rgba(130,140,200,0.6)"},"xanchor":"left"},{"x":1.01,"y":5.5,"xref":"paper","yref":"y","text":"\u003cb\u003eNetworking\u003c\u002fb\u003e","showarrow":false,"font":{"size":9,"color":"rgba(130,140,200,0.6)"},"xanchor":"left"},{"x":1.01,"y":4.5,"xref":"paper","yref":"y","text":"\u003cb\u003eIdentity\u003c\u002fb\u003e","showarrow":false,"font":{"size":9,"color":"rgba(130,140,200,0.6)"},"xanchor":"left"},{"x":1.01,"y":3.5,"xref":"paper","yref":"y","text":"\u003cb\u003eCompute\u003c\u002fb\u003e","showarrow":false,"font":{"size":9,"color":"rgba(130,140,200,0.6)"},"xanchor":"left"},{"x":1.01,"y":2.0,"xref":"paper","yref":"y","text":"\u003cb\u003ePlatform\u003c\u002fb\u003e","showarrow":false,"font":{"size":9,"color":"rgba(130,140,200,0.6)"},"xanchor":"left"},{"x":1.01,"y":0.5,"xref":"paper","yref":"y","text":"\u003cb\u003eData\u003c\u002fb\u003e","showarrow":false,"font":{"size":9,"color":"rgba(130,140,200,0.6)"},"xanchor":"left"},{"x":1.02,"y":0.99,"xref":"paper","yref":"paper","text":"\u003cb\u003eWorkflow Steps\u003c\u002fb\u003e\u003cbr\u003e\u003cbr\u003e1. User navigates to \u002fjupyterhub via ALB\u003cbr\u003e2. GitHub OAuth authenticates the user\u003cbr\u003e3. JupyterHub Hub spawns jupyter-\u003cusername\u003e pod on EKS\u003cbr\u003e4. Pod mounts EFS (ReadWriteMany) as the persistent home directory\u003cbr\u003e5. User opens notebook and begins exploration \u002f model development\u003cbr\u003e6. Notebook code calls MLflow Tracking API to log experiments\u003cbr\u003e7. Artifacts and metrics saved to S3: mlflow-artifacts and RDS MySQL","showarrow":false,"align":"left","xanchor":"left","yanchor":"top","font":{"size":10,"color":"rgba(210,218,245,0.92)","family":"Inter, Arial, sans-serif"},"bgcolor":"rgba(10,14,28,0.90)","bordercolor":"#00BCD4","borderwidth":2,"borderpad":11}]}],"label":"  Notebook Session","method":"update"},{"args":[{"visible":[true,true,false,false,false,false,false,false,false,false,true,true,false,false,false,false]},{"title.text":"\u003cb\u003eObservability & Alerting\u003c\u002fb\u003e\u003cspan style='color:rgba(160,170,220,0.8);font-size:13px'\u003e  --  Prometheus scrapes all platform \u002fmetrics endpoints -\u003e Grafana dashboards visualize and alert on anomalies.\u003c\u002fspan\u003e","annotations":[{"x":1.01,"y":6.5,"xref":"paper","yref":"y","text":"\u003cb\u003eEntry\u003c\u002fb\u003e","showarrow":false,"font":{"size":9,"color":"rgba(130,140,200,0.6)"},"xanchor":"left"},{"x":1.01,"y":5.5,"xref":"paper","yref":"y","text":"\u003cb\u003eNetworking\u003c\u002fb\u003e","showarrow":false,"font":{"size":9,"color":"rgba(130,140,200,0.6)"},"xanchor":"left"},{"x":1.01,"y":4.5,"xref":"paper","yref":"y","text":"\u003cb\u003eIdentity\u003c\u002fb\u003e","showarrow":false,"font":{"size":9,"color":"rgba(130,140,200,0.6)"},"xanchor":"left"},{"x":1.01," 3c\u002fb\u003e","showarrow":false,"font":{"size":9,"color":"rgba(130,140,200,0.6)"},"xanchor":"left"},{"x":1.01,"y":5.5,"xref":"paper","yref":"y","text":"\u003cb\u003eNetworking\u003c\u002fb\u003e","showarrow":false,"font":{"size":9,"color":"rgba(130,140,200,0.6)"},"xanchor":"left"},{"x":1.01,"y":4.5,"xref":"paper","yref":"y","text":"\u003cb\u003eIdentity\u003c\u002fb\u003e","showarrow":false,"font":{"size":9,"color":"rgba(130,140,200,0.6)"},"xanchor":"left"},{"x":1.01,"y":3.5,"xref":"paper","yref":"y","text":"\u003cb\u003eCompute\u003c\u002fb\u003e","showarrow":false,"font":{"size":9,"color":"rgba(130,140,200,0.6)"},"xanchor":"left"},{"x":1.01,"y":2.0,"xref":"paper","yref":"y","text":"\u003cb\u003ePlatform\u003c\u002fb\u003e","showarrow":false,"font":{"size":9,"color":"rgba(130,140,200,0.6)"},"xanchor":"left"},{"x":1.01,"y":0.5,"xref":"paper","yref":"y","text":"\u003cb\u003eData\u003c\u002fb\u003e","showarrow":false,"font":{"size":9,"color":"rgba(130,140,200,0.6)"},"xanchor":"left"},{"x":1.02,"y":0.99,"xref":"paper","yref":"paper","text":"\u003cb\u003eWorkflow Steps\u003c\u002fb\u003e\u003cbr\u003e\u003cbr\u003e1. ESO pod starts with a K8s ServiceAccount bound to iam_eso IRSA role\u003cbr\u003e2. EKS OIDC provider issues a signed JWT token for the ServiceAccount\u003cbr\u003e3. ESO assumes iam_eso IAM role, gains GetSecretValue permission\u003cbr\u003e4. ESO reads all mlplatform\u002f* paths from AWS Secrets Manager\u003cbr\u003e5. ESO creates or updates Kubernetes Secret objects in each namespace\u003cbr\u003e6. Platform pods mount K8s Secrets as environment variables at startup\u003cbr\u003e7. Auto-rotation: ESO re-syncs K8s Secrets when AWS secret values change","showarrow":false,"align":"left","xanchor":"left","yanchor":"top","font":{"size":10,"color":"rgba(210,218,245,0.92)","family":"Inter, Arial, sans-serif"},"bgcolor":"rgba(10,14,28,0.90)","bordercolor":"#FF5722","borderwidth":2,"borderpad":11}]}],"label":"  Secret Injection (ESO)","method":"update"},{"arg
